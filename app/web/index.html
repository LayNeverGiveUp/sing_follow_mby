<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Song Followup API Demo</title>
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="./styles.css?v=hum-mvp-2" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <header class="topbar">
          <div>
            <p class="eyebrow">Hum Song MVP</p>
            <h1>毛不易歌曲接唱测试台</h1>
          </div>
          <div class="status" id="connectionStatus">Idle</div>
        </header>

        <div class="control-grid single-field">
          <label class="field">
            <span>WebSocket URL</span>
            <input id="wsUrl" value="ws://127.0.0.1:8000/v1/realtime-match" />
          </label>
        </div>

        <div class="actions">
          <button id="vocalTestButton" class="primary">一键干声测试</button>
          <button id="recordButton" class="secondary">开始录音（4–8 秒）</button>
          <button id="clearButton" class="secondary">清空结果</button>
        </div>

        <section class="recording-playback user-recording">
          <div>
            <p class="eyebrow">Your Recording</p>
            <h2>用户清唱 / 哼唱</h2>
          </div>
          <p class="hint" id="recordingHint">点击“开始录音”，唱或哼 4–8 秒，再点击“停止并识别”。</p>
          <audio id="recordedAudio" controls></audio>
        </section>

        <section class="recording-playback">
          <div>
            <p class="eyebrow">Selected Prompt</p>
            <h2>抽中这一句</h2>
          </div>
          <p class="hint" id="queryLabel">识别成功后显示当前句。</p>
          <audio id="queryAudio" controls></audio>
        </section>

        <section class="recording-playback">
          <div>
            <p class="eyebrow">Next Line</p>
            <h2>下一句接唱</h2>
          </div>
          <p class="hint" id="nextLabel">识别成功后显示下一句。</p>
          <audio id="nextAudio" controls></audio>
        </section>
      </section>

      <section class="panel result-panel">
        <div class="result-head">
          <div>
            <p class="eyebrow">Result</p>
            <h2 id="resultTitle">等待测试</h2>
          </div>
          <div class="metric">
            <span id="endToResult">--</span>
            <small>end_to_result</small>
          </div>
        </div>

        <div class="result-grid">
          <div class="kv">
            <span>Matched</span>
            <strong id="matched">--</strong>
          </div>
          <div class="kv">
            <span>Song ID</span>
            <strong id="songId">--</strong>
          </div>
          <div class="kv">
            <span>Confidence</span>
            <strong id="confidence">--</strong>
          </div>
          <div class="kv">
            <span>当前句 → 下一句</span>
            <strong id="matchedLine">--</strong>
          </div>
        </div>

        <section class="diagnostic-log">
          <p class="eyebrow">Diagnostic Log</p>
          <pre id="eventLog">等待操作。</pre>
        </section>

        <pre id="rawJson">{}</pre>
      </section>
    </main>

    <script src="./app.js?v=hum-mvp-13"></script>
  </body>
</html>
